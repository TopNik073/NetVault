<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download File - NetVault</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
        }
        .container {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #2563EB;
            margin-bottom: 24px;
        }
        .file-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: #EFF6FF;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .file-icon svg {
            width: 32px;
            height: 32px;
            color: #2563EB;
        }
        .filename {
            font-size: 18px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 8px;
            word-break: break-all;
            padding: 0 10px;
        }
        .file-size {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 24px;
        }
        .btn {
            background: #2563EB;
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn svg {
            width: 20px;
            height: 20px;
        }
        .error {
            color: #F44336;
            margin-top: 16px;
            padding: 12px;
            background: #FEE2E2;
            border-radius: 8px;
            font-size: 14px;
        }
        .info {
            color: #6B7280;
            margin-top: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .info svg {
            width: 16px;
            height: 16px;
        }
        .loading {
            color: #6B7280;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #E5E7EB;
            border-top-color: #2563EB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .expires {
            margin-top: 12px;
            font-size: 12px;
            color: #6B7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">NetVault</div>

        <div class="file-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
            </svg>
        </div>

        <div class="filename" id="filename">Loading...</div>
        <div class="file-size" id="fileSize"></div>

        <div id="error" class="error" style="display: none;"></div>

        <a id="downloadBtn" class="btn" href="#" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v11.25m0 0l-3.75-3.75M12 14.25l3.75-3.75" />
            </svg>
            Download
        </a>


        <div id="info" class="info" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
            </svg>
            <span id="infoText"></span>
        </div>

        <div id="expires" class="expires" style="display: none;"></div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            Loading...
        </div>
    </div>

    <script>
        const linkId = '{{link_id}}';
        const filenameEl = document.getElementById('filename');
        const fileSizeEl = document.getElementById('fileSize');
        const errorEl = document.getElementById('error');
        const downloadBtn = document.getElementById('downloadBtn');
        const infoEl = document.getElementById('info');
        const infoTextEl = document.getElementById('infoText');
        const expiresEl = document.getElementById('expires');
        const loadingEl = document.getElementById('loading');

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function init() {
            try {
                const infoRes = await fetch('/api/v1/public-links/' + linkId + '/info');
                if (!infoRes.ok) {
                    const err = await infoRes.json();
                    errorEl.textContent = err.detail || 'Error';
                    errorEl.style.display = 'block';
                    loadingEl.style.display = 'none';
                    return;
                }

                const info = await infoRes.json();
                filenameEl.textContent = info.fileName || 'File';

                if (info.fileSize) {
                    fileSizeEl.textContent = formatBytes(info.fileSize);
                }

                if (info.maxDownloads) {
                    infoTextEl.textContent = 'Downloads: ' + info.downloadsCount + ' / ' + info.maxDownloads;
                    infoEl.style.display = 'flex';
                } else {
                    infoTextEl.textContent = 'Downloads: ' + info.downloadsCount;
                    infoEl.style.display = 'flex';
                }

                if (info.expiresAt) {
                    const expDate = new Date(info.expiresAt);
                    expiresEl.textContent = 'Expires: ' + expDate.toLocaleDateString();
                    expiresEl.style.display = 'block';
                }

                const downloadRes = await fetch('/api/v1/public-links/' + linkId + '/download');
                if (!downloadRes.ok) {
                    const err = await downloadRes.json();
                    errorEl.textContent = err.detail || 'Error';
                    errorEl.style.display = 'block';
                    loadingEl.style.display = 'none';
                    return;
                }

                const data = await downloadRes.json();
                downloadBtn.href = data.url;
                downloadBtn.style.display = 'inline-flex';
                loadingEl.style.display = 'none';
            } catch (e) {
                errorEl.textContent = 'Error loading download link';
                errorEl.style.display = 'block';
                loadingEl.style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
